<div class="social-links-inline">
  {% if site.github_url %}
  <a href="{{ site.github_url }}" target="_blank" rel="noopener" title="GitHub">
    <img src="{{ '/assets/images/github.svg' | relative_url }}" alt="GitHub">
  </a>
  {% endif %}
  {% if site.scholar_url %}
  <a href="{{ site.scholar_url }}" target="_blank" rel="noopener" title="Google Scholar">
    <img src="{{ '/assets/images/scholar.svg' | relative_url }}" alt="Google Scholar">
  </a>
  {% endif %}
  {% if site.linkedin_url %}
  <a href="{{ site.linkedin_url }}" target="_blank" rel="noopener" title="LinkedIn">
    <img src="{{ '/assets/images/linkedin.svg' | relative_url }}" alt="LinkedIn">
  </a>
  {% endif %}
</div>
