<header class="site-header">
  <div class="header-inner">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.person.name | default: site.title }}</a>

    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="site-nav" id="siteNav" role="navigation">
      {% for item in site.data.navigation %}
      <a class="nav-link{% if page.url == item.url %} active{% endif %}"
         href="{{ item.url | relative_url }}">{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
